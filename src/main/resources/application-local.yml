spring:
  application:
    name: game-price-comparator
  
  datasource:
    url: jdbc:postgresql://localhost:5432/gameprice
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    com.gameprice: DEBUG